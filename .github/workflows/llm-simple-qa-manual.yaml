name: LLM Simple QA E2E

on:
  workflow_dispatch:

jobs:
  llm-simple-qa-e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install Ianvs system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx
          python -m pip install --upgrade pip

      - name: Install Ianvs from source
        run: |
          python -m pip install ./resources/third_party/*
          python -m pip install -r requirements.txt
          python setup.py install
          ianvs -v

      - name: Install llm_simple_qa dependencies
        run: |
          python -m pip install -r examples/llm_simple_qa/requirements.txt
          python -m pip install resources/third_party/sedna-0.6.0.1-py3-none-any.whl

      - name: Prepare llm_simple_qa dataset
        run: |
          python examples/llm_simple_qa/scripts/prepare_dataset.py

      - name: Run Ianvs llm_simple_qa example
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
        run: |
          ianvs -f examples/llm_simple_qa/benchmarkingjob.yaml

      - name: Upload Ianvs workspace
        if: ${{ github.actor != 'nektos/act' }}
        uses: actions/upload-artifact@v4
        with:
          name: llm-simple-qa-workspace
          path: workspace
          if-no-files-found: warn
